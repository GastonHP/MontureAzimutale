<!DOCTYPE html>
<html>

<head>
    <title>Telescope Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: #eee;
        }

        .card {
            background: #333;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 150px;
        }

        .value {
            font-size: 1.2em;
            color: #00ffcc;
            font-weight: bold;
        }

        .btn {
            padding: 20px;
            font-size: 20px;
            width: 80px;
            margin: 5px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background: #444;
            color: white;
        }

        .btn:active {
            background: #666;
        }

        .log {
            background: #222;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            text-align: left;
            font-family: monospace;
            color: #0f0;
        }
    </style>
</head>

<body>
    <h1>Telescope</h1>
    <table style="margin: 0 auto;">
        <tr>
            <td>
                <div class="card">
                    <div>Azimut/yaw<br>Direction</div>
                    <div id="yaw" class="value">0.0°</div>
                    <div id="deltaAZ" class="value">0</div>
                </div>
                <div class="card">
                    <div>Inclinaison/pitch<br>Altitude</div>
                    <div id="pitch" class="value">0.0°</div>
                    <div id="deltaALT" class="value">0</div>
                </div>
                <div class="card">
                    <div>Roulis/roll<br>Angle</div>
                    <div id="roll" class="value">0.0°<br>&nbsp;</div>
                </div>
                <div class="card">
                    <div>Accuracy<br>Pr&eacute;cision</div>
                    <div id="accuracy" class="value">0.0</div>
                    <div id="precision" class="value">0</div>
                </div>
                <div class="card">
                    <div>Batterie</div>
                    <div id="batt" class="value">-- V</div>
                </div>
                <div class="card">
                    <div>Sats</div>
                    <div id="sats" class="value">0</div>
                </div>
                <br>
                <div style="margin-top:20px;">
                    <button class="btn" onclick="move('up')">up</button><br>
                    <button class="btn" onclick="move('left')">left</button>
                    <button class="btn" style="background:#d32f2f" onclick="move('stop')">stop</button>
                    <button class="btn" onclick="move('right')">right</button><br>
                    <button class="btn" onclick="move('down')">down</button><br>
                </div>
                <div style="margin-top:20px;">
                    <button class="btn" style="background:#37ad51; width: 130px;"
                        onclick="move('origine')">origine</button>
                    <button class="btn" style="background:#4f3ba3;width: 130px;"
                        onclick="move('calibrate')">calibration</button>
                    <button class="btn" style="background:#4f3ba3;width: 130px;"
                        onclick="move('calibrateMVT')">calibration<br>mouvement</button><br>
                </div>
            </td>
            <td>
                <div id="log0" class="log">l0xxxxxxxxxxxxxxxxxxxx</div>
                <div id="log1" class="log">l1</div>
                <div id="log2" class="log">l2</div>
                <div id="log3" class="log">l3</div>
                <div id="log4" class="log">l4</div>
                <div id="log5" class="log">l5</div>
                <div id="log6" class="log">l6</div>
                <div id="log7" class="log">l7</div>
                <div id="log8" class="log">l8</div>
                <div id="log9" class="log">l9</div>
                <div id="log10" class="log">l10</div>
                <div id="log11" class="log">l11</div>
                <div id="log12" class="log">l12</div>
                <div id="log13" class="log">l13</div>
                <div id="log14" class="log">l14</div>
                <div id="log15" class="log">l15</div>
                <div id="log16" class="log">l16</div>
                <div id="log17" class="log">l17</div>
                <div id="log18" class="log">l18</div>
                <div id="log19" class="log">l19</div>
            </td>
        </tr>

    </table>

    <script>
        function move(dir) { fetch('/control?dir=' + dir); }
        // Écoute les mises à jour automatiques du serveur
        if (!!window.EventSource) {
            var source = new EventSource('/events');
            source.addEventListener('data_update', function (e) {
                var obj = JSON.parse(e.data);
                document.getElementById('yaw').innerHTML = obj.yaw + "&deg;"; // ° est un caractère spécial, on peut aussi utiliser "°"
                document.getElementById('pitch').innerHTML = obj.pitch + "&deg;";
                document.getElementById('roll').innerHTML = obj.roll + "&deg;";
                document.getElementById('accuracy').innerHTML = obj.accuracy;
                document.getElementById('precision').innerHTML = obj.precision;
                document.getElementById('batt').innerHTML = obj.batt + " V";
                document.getElementById('sats').innerHTML = obj.sats;
                document.getElementById('deltaALT').innerHTML = obj.deltaALT;
                document.getElementById('deltaAZ').innerHTML = obj.deltaAZ;
                for (var l = 0; l < 20; l++) {
                    var logElement = document.getElementById('log' + l);
                    if (logElement) {
                        logElement.innerHTML = obj['log' + l];
                    }
                }
            }, false);
        }
    </script>
</body>

</html>
