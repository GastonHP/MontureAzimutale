; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
workspace_dir = c:\tmp\pio\MontureAzimutale
lib_dir = ../lib/lib

[env]
platform = espressif32
board = mon_esp32-s3-devkitc-1
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.extra_flags = -DBOARD_HAS_PSRAM
framework = arduino
monitor_speed = 115200
build_flags = 
	-D SERIAL_SPEED=115200
	-D FTPPath=\"monture\"
	-D SID=\"monture\"
	-D deviceName=\"monture\"
	-D DeviceId=\"montureId\"

	-D GHFS_ACTIF
	-D OTA_ACTIF
  	-D ota_password=\"Archiduc\"
  	-D ota_port=8266
	-D LISTDIR
	-D USE_RGB_LED

	-D ASYNCWEBSERVER_REGEX=1
	-D HA_ACTIF
	-D ESPINFOS_ACTIF  
  	-D LOG_ACTIF 
	-D MAX_LOG=4000
	-D LOG_DEBUG
  	-D FTP_ACTIF
  	-D HORLOGE_ACTIF
  	-D CONFIG_ACTIF
	-D SPIFFS_ACTIF
	;-D TESTGPS

lib_deps = 
	FASTLED
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit BNO08x@^1.2.5
	mikalhart/TinyGPSPlus@^1.1.0
	bblanchon/ArduinoJson@^7.4.2
	paulstoffregen/Time@^1.6.1
	arduino-libraries/NTPClient @^3.2.1
	
[env:ESP32_s3-N16R8-WROOM-1]

[env:ESP32_s3-N16R8-WROOM-1-OTA]
upload_protocol = espota
upload_flags =
  --port=8266
  --auth=Archiduc
upload_port = monture.local


